<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberWatch Admin Console</title>
    <link rel="stylesheet" href="cyberwatch.css">
</head>
<body>
    <div class="app-frame">
        <section class="login-screen" id="loginScreen">
            <header class="top-header login-header">
                <div class="brand-badge">CYBERWATCH</div>
            </header>

            <div class="login-layout">
                <form class="login-panel" id="loginForm">
                    <label class="auth-field">
                        <span class="sr-only">Username</span>
                        <input type="text" id="usernameInput" name="username" placeholder="Username" value="alice_admin" required>
                    </label>
                    <label class="auth-field">
                        <span class="sr-only">Password</span>
                        <input type="password" id="passwordInput" name="password" placeholder="Password" value="password" required>
                    </label>
                    <button type="submit" class="login-button">Login</button>
                </form>
            </div>
        </section>

        <section class="workspace hidden" id="appShell">
            <header class="top-header">
                <div class="brand-badge">CYBERWATCH</div>

                <div class="admin-badge">
                    <div class="admin-avatar">SA</div>
                    <div class="admin-copy">
                        <span>System</span>
                        <strong>ADMIN</strong>
                    </div>
                </div>
            </header>

            <div class="shell-grid">
                <aside class="sidebar">
                    <nav class="sidebar-nav" aria-label="Primary">
                        <button class="nav-item active" data-view="dashboard">
                            <span class="nav-icon">
                                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 3h6v6H3V3Zm8 0h6v6h-6V3ZM3 11h6v6H3v-6Zm8 0h6v6h-6v-6Z"/></svg>
                            </span>
                            <span>Dashboard</span>
                        </button>
                        <button class="nav-item" data-view="logs">
                            <span class="nav-icon">
                                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 2.5h7l4 4V17a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-13a1 1 0 0 1 1-1Zm6 1.8V7h3.7"/><path d="M7 10h6M7 13h6"/></svg>
                            </span>
                            <span>Logs</span>
                        </button>
                        <button class="nav-item" data-view="alerts">
                            <span class="nav-icon">
                                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 3 18 17H2L10 3Zm0 4.5v4.2M10 14.7h.01"/></svg>
                            </span>
                            <span>Alerts</span>
                        </button>
                        <button class="nav-item" data-view="reports">
                            <span class="nav-icon">
                                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 16.5h12M6 14V8M10 14V4M14 14v-6"/></svg>
                            </span>
                            <span>Reports</span>
                        </button>
                        <button class="nav-item" id="logoutBtn">
                            <span class="nav-icon">
                                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M8 4H5a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/><path d="M12 6.5 16 10l-4 3.5M16 10H7"/></svg>
                            </span>
                            <span>Log out</span>
                        </button>
                    </nav>

                    <button class="sidebar-collapse" type="button" aria-label="Collapse sidebar">
                        <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m12.5 5-5 5 5 5"/></svg>
                    </button>
                </aside>

                <main class="content-shell">
                    <section class="view active" id="view-dashboard">
                        <div class="page-actions end">
                            <button class="action-button action-blue" id="refreshDashboardBtn">
                                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M15.5 8a5.5 5.5 0 1 0 1 3.2"/><path d="M16 4v4h-4"/></svg>
                                <span>Refresh Data</span>
                            </button>
                        </div>

                        <div class="stat-grid" id="dashboardStats"></div>

                        <div class="panel hero-panel"></div>

                        <section class="panel table-panel">
                            <div class="panel-head">
                                <h2>Recent Login Activity</h2>
                                <button class="text-link" data-view-target="logs">View all logs
                                    <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M6 10h8M11 5l5 5-5 5"/></svg>
                                </button>
                            </div>

                            <div class="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>User ID</th>
                                            <th>Username</th>
                                            <th>Login time</th>
                                            <th>Status</th>
                                            <th>IP Address</th>
                                        </tr>
                                    </thead>
                                    <tbody id="dashboardTableBody"></tbody>
                                </table>
                            </div>
                        </section>
                    </section>

                    <section class="view" id="view-logs">
                        <section class="panel toolbar-panel">
                            <div class="log-toolbar">
                                <label class="search-box">
                                    <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m14.5 14.5 3 3M8.5 14a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11Z"/></svg>
                                    <input type="search" id="logsSearch" placeholder="Search by Username, User ID or IP">
                                </label>

                                <button class="icon-button filter-button" type="button" aria-label="Filter logs">
                                    <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 5h14L11.5 10v5l-3-1.8V10L3 5Z"/></svg>
                                </button>

                                <div class="pill-row">
                                    <button class="pill-button active" data-filter="all">All</button>
                                    <button class="pill-button success" data-filter="success">Success</button>
                                    <button class="pill-button failure" data-filter="failure">Failures</button>
                                </div>

                                <button class="action-button action-blue" id="refreshLogsBtn">
                                    <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M15.5 8a5.5 5.5 0 1 0 1 3.2"/><path d="M16 4v4h-4"/></svg>
                                    <span>Refresh Table</span>
                                </button>
                            </div>
                        </section>

                        <section class="panel table-panel">
                            <div class="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>User ID</th>
                                            <th>Username</th>
                                            <th>Login time</th>
                                            <th>Status</th>
                                            <th>IP Address</th>
                                        </tr>
                                    </thead>
                                    <tbody id="logsTableBody"></tbody>
                                </table>
                            </div>
                        </section>
                    </section>

                    <section class="view" id="view-alerts">
                        <div class="page-actions">
                            <button class="action-button action-amber" id="detectBtn">
                                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2.8 16.2 5v5.6c0 3.8-2.3 5.9-6.2 7.4-3.9-1.5-6.2-3.6-6.2-7.4V5L10 2.8Z"/></svg>
                                <span>Detect Suspicious Activity</span>
                            </button>
                            <button class="action-button action-red" id="clearAlertsBtn">
                                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 5h10M7 5V3.8h6V5M7.8 7.2v6M12.2 7.2v6M6.5 17h7a1 1 0 0 0 1-1L15 5H5l.5 11a1 1 0 0 0 1 1Z"/></svg>
                                <span>Clear Alerts</span>
                            </button>
                        </div>

                        <div class="severity-grid" id="severityStats"></div>

                        <div class="alerts-list" id="alertsList"></div>
                    </section>

                    <section class="view" id="view-reports">
                        <div class="page-actions end">
                            <button class="action-button action-blue" id="exportBtn">
                                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 3v8M7 8.5 10 11.5l3-3M4 13.5v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-1"/></svg>
                                <span>Export Report</span>
                            </button>
                        </div>

                        <div class="stat-grid" id="reportStats"></div>

                        <section class="panel table-panel">
                            <div class="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>User ID</th>
                                            <th>Username</th>
                                            <th>Login time</th>
                                            <th>Status</th>
                                            <th>IP Address</th>
                                            <th>Risk Level</th>
                                        </tr>
                                    </thead>
                                    <tbody id="reportsTableBody"></tbody>
                                </table>
                            </div>
                        </section>
                    </section>
                </main>
            </div>
        </section>

        <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
    </div>

    <script src="cyberwatch.js"></script>
</body>
</html>
